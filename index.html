    <!-- Bibliotecas CSS externos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css">

    <style>
        /* Reset e Configurações Gerais */
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{font-family:Arial,sans-serif;background:#050505;color:#fff;line-height:1.6}
        
        /* Cabeçalho fixo (Aumentado para acomodar a logo maior) */
        header{position:fixed;top:0;width:100%;height:120px;background:rgba(0,0,0,.95);display:flex;justify-content:space-between;align-items:center;padding:0 40px;z-index:1000;border-bottom:2px solid #d00}
        .logo img{height:100px;display:block;width:auto;object-fit:contain} /* Logo aumentada para 100px */
        nav a{color:#fff;text-decoration:none;margin:0 15px;font-weight:bold;transition:.3s}
        nav a:hover{color:#ff2b2b}

        /* Componentes Comuns */
        .btn{background:#e00000;color:#fff;text-decoration:none;padding:15px 30px;border-radius:10px;display:inline-block;font-weight:bold;transition:.3s;border:none;cursor:pointer}
        .btn:hover{background:#ff2b2b;transform:scale(1.03)}
        section{padding:150px 8% 60px} /* Compensando o header maior */
        .titulo{text-align:center;font-size:42px;margin-bottom:50px;text-transform:uppercase}
        
        /* Seção Hero (Banner Principal) */
        .hero{
            position:relative;
            min-height:100vh;
            background:linear-gradient(rgba(0,0,0,.60),rgba(0,0,0,.60)), url("imagens/cidade.png") center center/cover no-repeat;
            display:flex;
            align-items:center;
            padding:150px 8% 60px;
        }
        .hero-content{position:relative;z-index:2;max-width:700px}
        .overlay{position:absolute;inset:0;background:linear-gradient(90deg, rgba(0,0,0,.75), rgba(0,0,0,.3), transparent)}
        .red{color:#ff2b2b;font-size:28px;font-weight:700;letter-spacing:6px;margin-bottom:20px}
        .hero h1{font-size:80px;line-height:.95;font-weight:900;margin-bottom:25px;text-transform:uppercase}
        .hero p{font-size:22px;color:#ddd;margin-bottom:35px}

        /* Galeria de Fotos */
        .galeria{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:25px;margin-top:40px}
        .galeria img{width:100%;height:280px;object-fit:cover;border-radius:18px;transition:.4s;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,.4)}
        .galeria img:hover{transform:scale(1.05);box-shadow:0 15px 40px rgba(255,0,0,.35)}

        /* Formulário de Contato */
        .form{max-width:600px;margin:0 auto}
        .form input, .form textarea{width:100%;padding:15px;margin-bottom:15px;background:#111;border:1px solid #333;color:#fff;border-radius:8px;font-size:16px;font-family:inherit}
        .form input:focus, .form textarea:focus{outline:none;border-color:#d00}
        .form button{width:100%}
        
        /* Rodapé */
        footer{text-align:center;padding:50px;background:#000;border-top:2px solid #d00}
        footer h2{margin-bottom:15px}
        footer p{color:#aaa;margin-top:5px}
        
        /* Botão Flutuante do WhatsApp */
        .whats{position:fixed;bottom:20px;right:20px;width:65px;height:65px;background:#25D366;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;text-decoration:none;z-index:999;box-shadow:0 4px 15px rgba(0,0,0,0.4);transition:.3s}
        .whats:hover{transform:scale(1.1)}

        /* Responsividade (Mobile e Tablets) */
        @media(max-width:900px){
            header{padding:0 20px; height:100px}
            .logo img{height:80px} /* Um pouco menor no mobile para não esmagar os elementos */
            nav{display:none}
            .hero{padding:140px 25px 60px;justify-content:center;text-align:center}
            .hero-content{max-width:100%}
            .hero h1{font-size:45px}
            .hero p{font-size:18px}
            .red{font-size:20px;letter-spacing:4px}
            .titulo{font-size:32px}
            .galeria{grid-template-columns:1fr}
        }
    </style>
</head>
