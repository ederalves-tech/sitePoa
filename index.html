header{position:fixed;top:0;left:0;width:100%;height:90px;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:999}
header.scrolled{background:#000}

.logo img{
    height:100px;
    width:auto;
    object-fit:contain;
}

nav{display:flex;gap:20px}
nav a{text-decoration:none;color:#fff;font-weight:bold}
.btn{background:#d00;color:#fff;padding:12px 22px;border-radius:8px;text-decoration:none}
.hero{min-height:100vh;background:linear-gradient(rgba(100,100,100,10),rgba(100,100,100,.10)),url('imagens/123.jpeg') center/cover;display:flex;align-items:center;padding:120px 8%}

section{padding:70px 8%}
.titulo{text-align:center;font-size:40px;margin-bottom:40px}


.galeria{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(320px,1fr));

gap:18px;

}


.galeria img{

width:100%;

height:320px;

object-fit:cover;

border-radius:15px;

transition:.4s;

cursor:pointer;

}

.galeria img:hover{

transform:scale(1.05);

}

.form{max-width:600px;margin:auto}
.form input,.form textarea{width:100%;padding:14px;margin-bottom:12px;background:#111;color:#fff;border:1px solid #444;border-radius:8px}
footer{text-align:center;padding:40px;background:#000}
.whats,.topo{position:fixed;right:20px;width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none}
.whats{bottom:20px;background:#25D366}.topo{bottom:90px;background:#d00}
#menu{display:none;font-size:28px;cursor:pointer}
@media(max-width:768px){
header{height:75px}.logo img{height:55px}
nav{display:none;position:absolute;top:75px;left:0;width:100%;background:#000;flex-direction:column;padding:15px}
nav.show{display:flex}
#menu{display:block}
header>.btn{display:none}
.hero{text-align:center;justify-content:center;padding:100px 20px}
.hero h1{font-size:38px}.hero p{font-size:17px}
.galeria{grid-template-columns:repeat(2,1fr)}
.galeria img{height:150px}
}
@media(max-width:430px){.galeria{grid-template-columns:1fr}.hero h1{font-size:30px}}

  <h2 class="titulo">Solicite um Orçamento</h2>

  <!-- Adicionado o id "form-whatsapp" para controlar o envio -->
  <form class="form" id="form-whatsapp">
    <!-- Adicionado id e required em cada campo -->
    <input type="text" id="nome" placeholder="Nome" required>
    <input type="tel" id="telefone" placeholder="Telefone" required>
    <textarea id="mensagem" rows="6" placeholder="Mensagem" required></textarea>
    
    <button class="btn" type="submit">Enviar</button>
  </form>
</section>

<script>
  document.getElementById('form-whatsapp').addEventListener('submit', function(e) {
    e.preventDefault(); // Impede o formulário de recarregar a página

    // INSERA SEU NÚMERO AQUI (com DDD, apenas números. Ex: 5511999999999)
    const numeroWhatsapp = "5547996511712"; 

    // Pega os valores dos campos
    const nome = document.getElementById('nome').value;
    const telefone = document.getElementById('telefone').value;
    const mensagem = document.getElementById('mensagem').value;

    // Formata a mensagem que vai chegar no seu WhatsApp
    const textoMensagem = `Olá! Gostaria de um orçamento.%0A%0A` +
                          `*Nome:* ${encodeURIComponent(nome)}%0A` +
                          `*Telefone:* ${encodeURIComponent(telefone)}%0A` +
                          `*Mensagem:* ${encodeURIComponent(mensagem)}`;

    // Cria o link final da API do WhatsApp
    const url = `https://api.whatsapp.com/send?phone=${numeroWhatsapp}&text=${textoMensagem}`;

    // Abre o WhatsApp em uma nova aba
    window.open(url, '_blank');
  });
</script>
